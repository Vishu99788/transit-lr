<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TransitLR — Lorry Receipt Manager</title>
  <style>
    :root{--ink:#122033;--muted:#677589;--brand:#1267d6;--brand-dark:#0c4eaa;--paper:#fff;--wash:#f3f7fb;--line:#dce5ef;--good:#077a51}
    *{box-sizing:border-box} body{margin:0;background:var(--wash);font:14px/1.45 Inter,Segoe UI,Arial,sans-serif;color:var(--ink)}
    header{background:#0d2c55;color:#fff;padding:19px max(24px,calc((100% - 1180px)/2));display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{font-weight:800;font-size:21px;letter-spacing:-.5px}.brand span{color:#82c6ff}.tag{font-size:12px;color:#cbd8e8}
    main{max-width:1180px;margin:30px auto;padding:0 20px}.hero{display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:18px}.hero h1{margin:0;font-size:28px;letter-spacing:-.7px}.hero p{margin:5px 0 0;color:var(--muted)}
    .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;box-shadow:0 7px 25px #1934550d}.form-card{padding:24px}.section-title{font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:.75px;color:#36516f;padding-bottom:9px;border-bottom:1px solid var(--line);margin:23px 0 15px}.section-title:first-child{margin-top:0}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.span2{grid-column:span 2}.span3{grid-column:span 3} label{display:block;color:#46566b;font-weight:650;font-size:12px;margin-bottom:5px}input,textarea,select{width:100%;border:1px solid #cbd7e4;background:#fff;border-radius:7px;padding:10px 11px;font:inherit;color:var(--ink);outline:none}textarea{resize:vertical;min-height:72px}input:focus,textarea:focus,select:focus{border-color:var(--brand);box-shadow:0 0 0 3px #1267d618}
    .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:24px}.btn{border:0;border-radius:7px;padding:10px 15px;font-weight:750;cursor:pointer;font:inherit}.btn.primary{background:var(--brand);color:#fff}.btn.primary:hover{background:var(--brand-dark)}.btn.soft{background:#e8f0fa;color:#174b88}.btn.danger{background:#fff0f0;color:#b83a3a;padding:6px 9px;font-size:12px}
    .records{margin-top:28px;padding:22px}.records-head{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}.records h2{font-size:18px;margin:0}.search{max-width:300px}table{border-collapse:collapse;width:100%}th{text-align:left;color:#63758a;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:10px;border-bottom:1px solid var(--line)}td{padding:12px 10px;border-bottom:1px solid #edf1f5}tr:last-child td{border:0}.empty{text-align:center;padding:22px;color:var(--muted)}
    #receipt{display:none}.receipt-head{display:flex;justify-content:space-between;border-bottom:2px solid #132f55;padding-bottom:15px}.receipt-brand{font-size:25px;font-weight:900;color:#102f58}.receipt-brand small{display:block;font-size:11px;letter-spacing:1px;color:#5d7087}.lrbox{text-align:right}.lrno{font-size:22px;font-weight:800;color:#0d5db9}.party-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:18px 0}.box{border:1px solid #b9c9d9;padding:11px;border-radius:4px;min-height:90px}.box b{display:block;font-size:11px;color:#345270;text-transform:uppercase;margin-bottom:5px}.details{width:100%;margin:13px 0}.details td{border:1px solid #b9c9d9;padding:8px}.details td:nth-child(odd){background:#edf4fa;font-weight:700;width:16%}.goods th{background:#143a6b;color:#fff;padding:8px;text-align:left}.goods td{border:1px solid #b9c9d9;padding:9px}.total{display:flex;justify-content:flex-end;font-size:17px;font-weight:850;margin:14px 0}.sign{display:flex;justify-content:space-between;margin-top:48px;text-align:center}.sign div{border-top:1px solid #344e6e;width:180px;padding-top:6px;font-size:12px}
    @media(max-width:750px){.grid{grid-template-columns:1fr 1fr}.span2,.span3{grid-column:span 2}.hero{align-items:start;flex-direction:column}.records{overflow:auto}.tag{display:none}}@media(max-width:480px){.grid{grid-template-columns:1fr}.span2,.span3{grid-column:span 1}}
    @media print{body>*:not(#receipt){display:none!important}#receipt{display:block!important;padding:13mm;font:12px Arial;color:#000}.receipt-head{border-color:#000}.receipt-brand{color:#000}.lrno{color:#000}.goods th{background:#eee!important;color:#000!important;print-color-adjust:exact}.box,.details td,.goods td{border-color:#000!important}}
    #receipt .lr-print .address{font-size:0!important}#receipt .lr-print .address:after{content:'Office No 205, 2nd Floor, KutchArcade Platinum Building, Gandhidham (Kutch), 370 201  |  Web: www.jaihanumanlogistics.com';font-size:14px}
    #loginScreen{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:linear-gradient(135deg,#0d2c55,#1267d6)}.login-card{width:min(390px,calc(100% - 36px));background:#fff;padding:30px;border-radius:14px;box-shadow:0 20px 60px #0005}.login-card h1{margin:0;font-size:26px}.login-card p{color:var(--muted);margin:7px 0 22px}.login-card .btn{width:100%;margin-top:8px}.login-brand{font-weight:850;color:var(--brand);margin-bottom:18px}.user-session{display:flex;align-items:center;gap:9px;font-size:12px}.user-session button{padding:6px 9px}
  </style>
</head>
<body>
<div id="loginScreen"><div class="login-card"><div class="login-brand">Jai Hanuman Logistics</div><h1>LR User Login</h1><p>Enter your name to create Lorry Receipts under your account.</p><label>User Name</label><input id="loginName" autocomplete="username" placeholder="Your full name" autofocus><button class="btn primary" id="loginBtn" type="button">Login</button></div></div>
<header><div class="brand">Transit<span>LR</span></div><div class="user-session"><span id="signedInAs"></span><button class="btn soft" id="logoutBtn" type="button">Sign out</button></div></header>
<main>
  <div class="hero"><div><h1>Create a Lorry Receipt</h1><p>Fill in the shipment details, save it, then print a professional LR.</p></div><div class="actions" style="margin:0"><button class="btn soft" id="adminBtn" type="button">Admin: Edit Company</button><button class="btn soft" id="newBtn">+ New LR</button></div></div>
  <form class="card form-card" id="lrForm">
    <div class="section-title">Receipt & transport</div><div class="grid">
      <div><label>LR Number</label><input id="lrNumber" required readonly></div><div><label>LR Date</label><input id="lrDate" type="date" required></div><div><label>Prepared By (Logged-in User)</label><input id="preparedBy" readonly required></div><div><label>From City</label><input id="fromCity" placeholder="e.g. Delhi" required></div><div><label>To City</label><input id="toCity" placeholder="e.g. Mumbai" required></div>
      <div class="span2"><label>Transport Company</label><input id="company" value="Jai Hanuman Logistics" readonly required></div><div><label>Vehicle Number</label><input id="vehicle" list="vehicleList" placeholder="Type to find a saved vehicle" required></div><div><label>Driver Name & Mobile</label><input id="driver" placeholder="Driver details"></div>
      <div class="span3"><label>Fixed Office Address</label><input value="Office No 205, 2nd Floor, KutchArcade Platinum Building, Gandhidham (Kutch), 370 201 | www.jaihanumanlogistics.com" readonly></div>
    </div>
    <div class="section-title">Parties</div><div class="grid">
      <div class="span2"><label>Consignor (Sender)</label><input id="consignor" list="consignorList" placeholder="Type to find a saved party" required></div><div class="span2"><label>Consignee (Receiver)</label><input id="consignee" list="consigneeList" placeholder="Type to find a saved party" required></div>
      <div><label>Consignor GSTIN</label><input id="consignorGstin" placeholder="Optional"></div><div><label>Dispatch From</label><input id="dispatchFrom" placeholder="Pickup location"></div><div><label>Consignee GSTIN</label><input id="consigneeGstin" placeholder="Optional"></div><div><label>Ship To Party</label><input id="shipTo" placeholder="Optional"></div>
    </div>
    <div class="section-title">Goods & charges</div><div class="grid">
      <div class="span2"><label>Description of Goods</label><input id="goods" placeholder="e.g. Cartons of textile fabric" required></div><div><label>Packages</label><input id="packages" type="number" min="1" placeholder="0" required></div><div><label>Actual Weight (kg)</label><input id="weight" type="number" min="0" step="0.01" placeholder="0"></div>
      <div><label>Freight (₹)</label><input id="freight" type="number" min="0" step="0.01" placeholder="0" required></div><div><label>Payment Terms</label><select id="payment"><option>To Pay</option><option>Paid</option><option>To Be Billed</option></select></div><div class="span2"><label>Remarks</label><input id="remarks" placeholder="Optional special instructions"></div>
      <div><label>Product / Grade</label><input id="product" placeholder="Optional"></div><div><label>Rake / Order No.</label><input id="rakeNo" placeholder="Optional"></div><div><label>Batch No.</label><input id="batchNo" placeholder="Optional"></div><div><label>Invoice No.</label><input id="invoiceNo" placeholder="Optional"></div><div class="span2"><label>Waybill / E-way Bill No.</label><input id="waybillNo" placeholder="Optional"></div><div><label>Rate</label><input id="rate" placeholder="Optional"></div><div><label>Hamali Charges (₹)</label><input id="hamali" type="number" min="0" step="0.01" placeholder="0"></div>
    </div>
    <div class="actions"><button class="btn soft" type="button" id="previewBtn">Preview / Print</button><button class="btn primary" type="submit">Save LR</button></div>
  </form><datalist id="vehicleList"></datalist><datalist id="consignorList"></datalist><datalist id="consigneeList"></datalist>
  <section class="card records"><div class="records-head"><h2>Saved Lorry Receipts</h2><input class="search" id="search" placeholder="Search LR, party, city…"></div><div id="tableWrap"></div></section>
</main>
<article id="receipt"></article>
<script>
const $=id=>document.getElementById(id), fields=['lrNumber','lrDate','preparedBy','fromCity','toCity','company','vehicle','driver','consignor','consignee','consignorGstin','consigneeGstin','dispatchFrom','shipTo','goods','packages','weight','freight','payment','remarks','product','rakeNo','batchNo','invoiceNo','waybillNo','rate','hamali'];
let records=JSON.parse(localStorage.getItem('transitLR.records')||'[]');let active=null;let adminUnlocked=false;const adminPin='admin123';
function currentUser(){return sessionStorage.getItem('transitLR.loggedInUser')||''}function setUser(name){sessionStorage.setItem('transitLR.loggedInUser',name);$('signedInAs').textContent='Signed in: '+name;$('loginScreen').style.display='none';$('preparedBy').value=name}function showLogin(){$('loginScreen').style.display='grid';$('loginName').value='';$('loginName').focus()}
function nextNo(){const year=new Date().getFullYear();const nums=records.map(x=>+String(x.lrNumber).split('-').pop()||0);return `LR-${year}-${String(Math.max(0,...nums)+1).padStart(4,'0')}`}
function reset(){active=null;$('lrForm').reset();$('lrNumber').value=nextNo();$('lrDate').value=new Date().toISOString().slice(0,10);$('company').value=localStorage.getItem('transitLR.company')||'Jai Hanuman Logistics';$('company').readOnly=!adminUnlocked;$('preparedBy').value=currentUser();window.scrollTo({top:0,behavior:'smooth'})}
function read(){let r={};fields.forEach(f=>r[f]=$(f).value.trim());return r}function fill(r){fields.forEach(f=>$(f).value=r[f]||'');$('company').value=localStorage.getItem('transitLR.company')||'Jai Hanuman Logistics';$('company').readOnly=!adminUnlocked;active=r.lrNumber}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function suggestions(){[['vehicle','vehicleList'],['consignor','consignorList'],['consignee','consigneeList']].forEach(([field,list])=>{let values=[...new Set(records.map(r=>r[field]).filter(Boolean))].sort();$(list).innerHTML=values.map(v=>`<option value="${esc(v)}"></option>`).join('')})}function render(list=records){suggestions();$('tableWrap').innerHTML=list.length?`<table><thead><tr><th>LR No.</th><th>Date</th><th>Route</th><th>Consignor</th><th>Vehicle</th><th>Freight</th><th></th></tr></thead><tbody>${list.map(r=>`<tr><td><b>${esc(r.lrNumber)}</b></td><td>${esc(r.lrDate)}</td><td>${esc(r.fromCity)} → ${esc(r.toCity)}</td><td>${esc(r.consignor).split('\n')[0]}</td><td>${esc(r.vehicle)}</td><td>₹${Number(r.freight||0).toLocaleString('en-IN')}</td><td><button class="btn soft" onclick="openLR('${r.lrNumber}')">Open</button> <button class="btn danger" onclick="removeLR('${r.lrNumber}')">Delete</button></td></tr>`).join('')}</tbody></table>`:'<div class="empty">No Lorry Receipts saved yet. Create your first LR above.</div>'}
function receipt(r){let total=Number(r.freight||0)+Number(r.hamali||0);return `<style>.lr-print{border:2px solid #000;font-family:Georgia,'Times New Roman',serif}.lr-print table{border-collapse:collapse;width:100%}.lr-print td,.lr-print th{border:1px solid #000;padding:4px 6px;vertical-align:top}.lr-print .top{border:0;text-align:center;font-weight:bold}.lr-print .title{text-align:center;font-size:38px;font-weight:bold;padding:12px}.lr-print .address{font-weight:bold;font-size:14px}.lr-print .heading{font-weight:bold;font-size:15px}.lr-print .small{font:11px Arial,sans-serif;line-height:1.55}.lr-print .insurance{text-align:center;font-weight:bold;line-height:1.55}.lr-print .no{font-size:25px;font-weight:bold;padding:6px 18px}.lr-print .data{font-size:15px}.lr-print .item{height:220px}.lr-print .product{font-size:14px;line-height:2}.lr-print .money{font-size:16px;font-weight:bold}.lr-print .footer{font-weight:bold;text-align:center;padding:12px}.lr-print .note{font-size:12px}.lr-print .charges{height:28px}@media print{.lr-print{border:2px solid #000!important}.lr-print td,.lr-print th{border:1px solid #000!important}}</style><section class="lr-print"><table><tr><td class="top">Subject to Gandhidham Jurisdiction</td><td class="top" style="width:25%">Consignee Copy</td></tr></table><div class="title">${esc(r.company)}</div><div class="address">Office Address &nbsp; | &nbsp; Lorry Receipt / Goods Consignment Note</div><table><tr><td style="width:39%"><div class="heading" style="text-align:center">Caution</div><div class="small">This consignment will not be detained, delivered or re-routed without consignee bank's written permission. It will be delivered at the destination.</div><div class="heading" style="text-align:center;border-top:1px solid #000;margin-top:5px">Notice</div><div class="small">The consignment covered by this special lorry receipt shall be stored at destination under the control of the transport operator and delivered to the consignee named in this receipt.</div></td><td style="width:27%"><div class="heading" style="text-align:center">At Owner Risk</div><div class="insurance">Insurance<br><span class="small">The customer has stated that the consignment is insured / not insured.</span></div><div class="small" style="border-top:1px solid #000;padding-top:4px">Company: ${esc(r.company)}<br>Policy No.: __________ &nbsp; Date: __________<br>Amount: __________ &nbsp; Risk: __________</div></td><td style="width:34%"><table><tr><td class="heading">Date</td><td class="data">${esc(r.lrDate)}</td></tr><tr><td class="heading">Vehicle No.</td><td class="data">${esc(r.vehicle)}</td></tr><tr><td class="heading">From</td><td class="data">${esc(r.fromCity)}</td></tr><tr><td class="heading">To</td><td class="data">${esc(r.toCity)}</td></tr></table></td></tr></table><div class="no">No. &nbsp; ${esc(r.lrNumber)}</div><table><tr><td class="heading" style="width:16%">Consigner</td><td class="data" style="width:34%">${esc(r.consignor).replace(/\n/g,'<br>')}</td><td class="heading" style="width:17%">Consignee's Name</td><td class="data">${esc(r.consignee).replace(/\n/g,'<br>')}</td></tr><tr><td class="heading">GSTIN.</td><td>${esc(r.consignorGstin)}</td><td class="heading">GSTIN.</td><td>${esc(r.consigneeGstin)}</td></tr><tr><td class="heading">Dispatch From</td><td>${esc(r.dispatchFrom)}</td><td class="heading">Ship to Party</td><td>${esc(r.shipTo)}</td></tr></table><table><tr><th style="width:7%">No.<br>of Pack.</th><th style="width:43%">DESCRIPTION / SIDE TO CONTAIN</th><th style="width:17%">Weight<br><span class="small">Nett / Charged</span></th><th style="width:13%">RATE</th><th style="width:20%">Freight</th></tr><tr><td class="item" style="text-align:center;vertical-align:middle">${esc(r.packages)}</td><td class="item product"><b>Goods:</b> ${esc(r.goods)}<br><b>Products:</b> ${esc(r.product||'—')}<br><b>Rake No:</b> ${esc(r.rakeNo||'—')}<br><b>Batch No:</b> ${esc(r.batchNo||'—')}<br><b>Invoice No:</b> ${esc(r.invoiceNo||'—')}<br><b>Waybill No:</b> ${esc(r.waybillNo||'—')}<br><br><b>Remarks:</b> ${esc(r.remarks||'—')}</td><td class="item" style="text-align:center;vertical-align:middle">${esc(r.weight||'—')}<br>MT</td><td class="item" style="vertical-align:bottom">${esc(r.rate||'')}</td><td class="item" style="vertical-align:bottom"><div class="money">${esc(r.payment)}</div><div class="charges">Freight ₹ ${Number(r.freight||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</div><div class="charges">Hamali ₹ ${Number(r.hamali||0).toLocaleString('en-IN',{minimumFractionDigits:2})}</div><div class="charges money">Total ₹ ${total.toLocaleString('en-IN',{minimumFractionDigits:2})}</div></td></tr></table><div class="note">We are not responsible for leakage & breakage. &nbsp; Terms & conditions overleaf.</div><table><tr><td class="footer">Person liable for paying GST<br><span class="small">1. Consignee &nbsp;&nbsp; 2. Consignor &nbsp;&nbsp; 3. Transporter</span></td><td class="footer">For, ${esc(r.company)}</td></tr></table></section>`}
window.openLR=no=>{let r=records.find(x=>x.lrNumber===no);if(r){fill(r);window.scrollTo({top:0,behavior:'smooth'})}};window.removeLR=no=>{if(confirm('Delete '+no+'?')){records=records.filter(x=>x.lrNumber!==no);localStorage.setItem('transitLR.records',JSON.stringify(records));render();if(active===no)reset()}};
$('lrForm').addEventListener('submit',e=>{e.preventDefault();let r=read();if(active&&active!==r.lrNumber)records=records.filter(x=>x.lrNumber!==active);let i=records.findIndex(x=>x.lrNumber===r.lrNumber);if(i>=0)records[i]=r;else records.unshift(r);localStorage.setItem('transitLR.records',JSON.stringify(records));localStorage.setItem('transitLR.company',r.company);localStorage.setItem('transitLR.user',r.preparedBy);active=r.lrNumber;render();alert('LR saved successfully.');});
$('previewBtn').onclick=()=>{if(!$('lrForm').reportValidity())return;let r=read();$('receipt').innerHTML=receipt(r)+`<div style="font:12px Arial,sans-serif;text-align:right;margin-top:6px">LR prepared by: <b>${esc(r.preparedBy)}</b></div>`;$('receipt').querySelector('.title').textContent=r.company;window.print()};$('newBtn').onclick=reset;$('adminBtn').onclick=()=>{if(!adminUnlocked){if(prompt('Enter admin PIN to edit the company name:')!==adminPin){alert('Incorrect PIN.');return}adminUnlocked=true;$('company').readOnly=false;$('adminBtn').textContent='Lock Company Name';alert('Admin mode enabled. You can now edit the company name.')}else{adminUnlocked=false;$('company').readOnly=true;$('adminBtn').textContent='Admin: Edit Company';alert('Company name locked.')}};$('search').oninput=e=>{let q=e.target.value.toLowerCase();render(records.filter(r=>Object.values(r).join(' ').toLowerCase().includes(q)))};$('loginBtn').onclick=()=>{let name=$('loginName').value.trim();if(!name){alert('Please enter your name.');return}setUser(name);reset()};$('loginName').onkeydown=e=>{if(e.key==='Enter')$('loginBtn').click()};$('logoutBtn').onclick=()=>{sessionStorage.removeItem('transitLR.loggedInUser');showLogin()};reset();render();if(currentUser())setUser(currentUser());else showLogin();
</script></body></html>
